name: Release hook

on:
  push:
    tags:
      - 'v*' 

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Create fat tarball
        run: |
          tar --exclude='.git' -czf "/tmp/cptpp_calculator-${{ github.ref_name }}.tar.gz" .
          mv "/tmp/cptpp_calculator-${{ github.ref_name }}.tar.gz" .

      - name: Upload tarball to release
        uses: softprops/action-gh-release@v2
        with:
          files: cptpp_calculator-${{ github.ref_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}