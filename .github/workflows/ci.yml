name: CPTPP commit check suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: setup ocaml and caching
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4.1"

      - name: install dependencies
        run: opam install . --deps-only --with-test

      - name: build ocaml components
        run: opam exec -- dune build

      - name: run standard test suite (alcotest + qcheck)
        run: opam exec -- dune runtest
