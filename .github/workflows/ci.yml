name: OCaml CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup OCaml & Install Dependencies
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.1.0 
          dune-cache: true

      - name: Install Tools
        run: opam install ocamlformat.0.29.0 csv zarith --yes

      - name: Check code formatting
        run: opam exec -- dune build @fmt

      - name: Build project
        run: opam exec -- dune build

      - name: Run test suite
        run: opam exec -- dune runtest