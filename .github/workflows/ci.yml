name: CPTPP CI suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v6 # Latest checkout
        with:
          submodules: true

      - name: setup ocaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.4.x  # Lock to 5.4+ to natively support Result.Syntax

      - name: add rocq prover upstream repository
        run: |
          opam repo add rocq-released https://rocq-prover.org/opam/released
          opam update

      - name: install project, rocq, and mutation dependencies
        run: opam install . rocq-prover munch --deps-only --with-test --yes
        
      - name: clean environment
        run: opam exec -- dune clean

      - name: build ocaml components
        run: opam exec -- dune build

      - name: tier 1: verify legal Chapter 3 specifications (rocq)
        run: opam exec -- dune build proofs

      - name: tier 2: run standard test suite (alcotest + qcheck)
        run: opam exec -- dune runtest

      - name: tier 3: execute mutation analysis (munch)
        run: opam exec -- munch run