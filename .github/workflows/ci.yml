name: CPTPP CI suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: setup ocaml, rocq, and caching
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4.1"
          opam-repositories: |
            rocq-released: https://rocq-prover.org/opam/released
            default: git+https://github.com/ocaml/opam-repository.git

      - name: install dependencies
        run: opam install . --deps-only --with-test --locked --yes

      - name: build ocaml components
        run: opam exec -- dune build

      - name: run standard test suite (alcotest + qcheck)
        run: opam exec -- dune runtest

      - name: verify legal Chapter 3 specifications (rocq)
        run: opam exec -- dune build proofs

