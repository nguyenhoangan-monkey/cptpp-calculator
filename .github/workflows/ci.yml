name: CPTPP CI suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v6 # Latest checkout
        with:
          submodules: true

      - name: setup ocaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.4.x  # Lock to 5.4+ to natively support Result.Syntax

      - name: add rocq prover upstream repository
        run: |
          opam repo add rocq-released https://rocq-prover.org/opam/released ||
          opam update

      - name: install project and rocq dependencies
        run: opam install . rocq-prover --deps-only --with-test --yes

      - name: check formatting
        run: opam exec -- dune build @fmt

      - name: build ocaml components
        run: opam exec -- dune build

      - name: run standard test suite (alcotest + qcheck)
        run: opam exec -- dune runtest

      - name: verify legal Chapter 3 specifications (rocq)
        run: opam exec -- dune build proofs