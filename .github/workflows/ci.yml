name: OCaml CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.1.0 
          dune-cache: true
          opam-disable-cache: false 

      - name: Install Opam Dependencies
        uses: ocaml/setup-ocaml/subactions/install-opam-deps@v3
        with:
          with-test: true
          with-doc: true
          extra-packages: ocamlformat.0.29.0

      - name: Check code formatting
        run: opam exec -- dune build @fmt

      - name: Build project
        run: opam exec -- dune build

      - name: Run test suite
        run: opam exec -- dune runtest