name: Release packaging

on:
  push:
    tags:
      - 'v*' 
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Create fat tarball
        run: |
          tar --exclude='.git' -czf "/tmp/cptpp-calculator-${{ github.ref_name }}.tar.gz" .
          mv "/tmp/cptpp-calculator-${{ github.ref_name }}.tar.gz" .

      - name: Create Release and Upload Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" "cptpp-calculator-${{ github.ref_name }}.tar.gz" \
            --title "${{ github.ref_name }}" \
            --notes "Automated release for tag ${{ github.ref_name }}"